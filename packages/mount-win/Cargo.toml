[package]
name = "opennetdrive-mount-win"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0"
description = "Windows mount implementation using WinFsp"

[dependencies]
opennetdrive-core = { path = "../core" }

# 异步运行时
tokio = { version = "1", features = ["sync", "rt-multi-thread"] }

# 日志
log = "0.4"
tracing = "0.1"

# 错误处理
anyhow = "1"
thiserror = "1"

# WinFsp FFI
[dependencies.winfsp-sys]
version = "0.3"
optional = true

[features]
default = []
winfsp = ["winfsp-sys"]
